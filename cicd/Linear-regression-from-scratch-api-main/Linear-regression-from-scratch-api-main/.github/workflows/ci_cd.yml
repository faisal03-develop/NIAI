# ====================================================================
# .github/workflows/ci_cd.yml
# ====================================================================
# This is the PIPELINE FILE — the brain of your CI/CD system.
#
# WHAT THIS FILE DOES:
#   Every time you push code to GitHub, GitHub reads this file and
#   automatically runs the steps you define here — on GitHub's servers,
#   not your laptop.
#
# STRUCTURE:
#   name      → what this pipeline is called
#   on        → WHEN to trigger (push, pull request, manual)
#   jobs      → the actual work to do (test, train, build, deploy)
#   steps     → individual commands within each job
#
# JOBS IN THIS PIPELINE:
#   1. test          → run all pytest tests
#   2. train         → retrain the model (only on main branch)
#   3. build-docker  → build a Docker container image
#   4. deploy        → deploy to Render (only on main branch)
#   5. notify        → send a status notification
# ====================================================================

name: CI/CD — House Price Linear Regression

# ────────────────────────────────────────────
# TRIGGER: When does this pipeline run?
# ────────────────────────────────────────────
on:
  push:
    branches:
      - main          # runs on every push to main
      - develop       # runs on develop branch too
  pull_request:
    branches:
      - main          # runs when someone opens a PR to main
  workflow_dispatch:  # allows manual trigger from GitHub UI


# ────────────────────────────────────────────
# GLOBAL ENVIRONMENT VARIABLES
# ────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.10"
  APP_NAME: "house-price-lr"


# ====================================================================
# JOB 1: TEST
# Run all unit tests, integration tests, and data quality checks.
# If ANY test fails, this job fails and jobs 2-4 are SKIPPED.
# ====================================================================
jobs:

  test:
    name: "🧪 Run Tests"
    runs-on: ubuntu-latest   # GitHub provides a fresh Ubuntu VM

    steps:
      # Step 1: Download your code onto the GitHub VM
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: "🐍 Set up Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip   # cache pip downloads for speed

      # Step 3: Install all Python dependencies
      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Generate dataset (needed for tests)
      - name: "📊 Generate dataset"
        run: python data/generate_data.py

      # Step 5: Train model (tests need the .pkl files)
      - name: "🏋️ Train model"
        run: python src/train.py

      # Step 6: Run ALL tests
      # --tb=short   → short traceback on failure
      # --cov        → measure code coverage
      # -v           → verbose output
      - name: "🧪 Run pytest"
        run: |
          pytest tests/ -v --tb=short

      # Step 7: If tests pass, upload the trained model as an artifact
      # so the next job (build) can use it without retraining
      - name: "💾 Upload model artifacts"
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: trained-model
          path: |
            models/
            data/house_prices.csv
          retention-days: 7


  # ====================================================================
  # JOB 2: CODE QUALITY (linting)
  # Checks that code follows style standards.
  # Runs in PARALLEL with the test job (both start at the same time).
  # ====================================================================
  lint:
    name: "🔍 Code Quality Check"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "📦 Install linting tools"
        run: pip install flake8

      # flake8 checks for Python syntax errors and style issues
      # --max-line-length=120  → allow lines up to 120 chars
      # --ignore=E501,W503      → ignore some minor warnings
      - name: "🔍 Run flake8 linting"
        run: |
          flake8 src/ app.py --max-line-length=120 \
            --ignore=E501,W503,W504 \
            --exclude=__pycache__
        continue-on-error: true   # don't fail pipeline on style issues (optional)


  # ====================================================================
  # JOB 3: BUILD DOCKER IMAGE
  # Packages the entire app into a Docker container.
  # Only runs if 'test' job PASSED (needs: [test]).
  # ====================================================================
  build:
    name: "🐳 Build Docker Image"
    runs-on: ubuntu-latest
    needs: [test]    # wait for test job to finish AND pass

    steps:
      - uses: actions/checkout@v4

      # Download the trained model saved by the test job
      - name: "📥 Download trained model"
        uses: actions/download-artifact@v4
        with:
          name: trained-model

      # Build Docker image
      # -t tags it with the app name and the current commit SHA
      # The SHA ensures each build has a unique identifier
      - name: "🐳 Build Docker image"
        run: |
          docker build \
            -t ${{ env.APP_NAME }}:${{ github.sha }} \
            -t ${{ env.APP_NAME }}:latest \
            .
          echo "✅ Docker image built successfully"

      # Quick smoke test: start the container and check /health
      - name: "💨 Smoke test — container health check"
        run: |
          # Start container in background (-d flag)
          docker run -d -p 5000:5000 \
            --name test-container \
            ${{ env.APP_NAME }}:latest

          # Wait for Flask to start
          sleep 5

          # Hit the health endpoint
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $HTTP_STATUS)"
          else
            echo "❌ Health check failed (HTTP $HTTP_STATUS)"
            docker logs test-container
            exit 1
          fi

      # Clean up test container
      - name: "🧹 Clean up"
        if: always()
        run: |
          docker stop test-container 2>/dev/null || true
          docker rm   test-container 2>/dev/null || true


  # ====================================================================
  # JOB 4: DEPLOY (Continuous Delivery)
  # Deploys to Render.com — only runs on the main branch
  # AND only if test + build both passed.
  #
  # On MAIN branch   → deploys to PRODUCTION
  # On other branches → deploy step is skipped
  # ====================================================================
  deploy:
    name: "🚀 Deploy to Production"
    runs-on: ubuntu-latest
    needs: [test, build]   # both must pass first

    # Only deploy when pushing to main (not on PRs or feature branches)
    if: false

    # This 'environment' block adds a required approval gate in GitHub UI
    # (optional — configure in repo Settings → Environments)
    environment:
      name: production
      url: https://house-price-lr.onrender.com   # update with your actual URL

    steps:
      - uses: actions/checkout@v4

      # Trigger Render to pull and deploy latest code
      # The RENDER_DEPLOY_HOOK is a secret URL you save in GitHub Secrets
      # (Settings → Secrets and variables → Actions → New repository secret)
      - name: "🚀 Trigger Render deployment"
        run: |
          echo "Deploying to Render..."
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -o /dev/null -w "HTTP status: %{http_code}\n"
          echo "✅ Deployment triggered!"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}

      # After deploying, verify the live site is up
      - name: "✅ Verify deployment"
        run: |
          echo "Waiting for deployment to complete..."
          sleep 30   # give Render time to restart

          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            https://house-price-lr.onrender.com/health || echo "000")

          if [ "$HTTP" = "200" ]; then
            echo "✅ Production deployment verified!"
          else
            echo "⚠️  Warning: health check returned HTTP $HTTP"
            echo "    Deployment may still be starting up."
          fi


  # ====================================================================
  # JOB 5: NOTIFY
  # Sends a summary to show what happened.
  # Runs AFTER all jobs, even if some failed.
  # ====================================================================
  notify:
    name: "📣 Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [test, lint, build, deploy]
    if: always()   # run even if earlier jobs failed

    steps:
      - name: "📣 Print pipeline summary"
        run: |
          echo "======================================"
          echo "  CI/CD Pipeline Complete"
          echo "======================================"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Author  : ${{ github.actor }}"
          echo "  Status  : ${{ job.status }}"
          echo "======================================"
