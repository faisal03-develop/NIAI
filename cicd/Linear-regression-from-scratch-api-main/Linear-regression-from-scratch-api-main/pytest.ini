# ====================================================================
# pytest.ini
# ====================================================================
# pytest configuration file.
# pytest reads this automatically when you run `pytest` in the project root.
# ====================================================================

[pytest]

# Where to find tests
testpaths = tests

# Output options
# -v          → verbose (show each test name)
# --tb=short  → short traceback on failure (easier to read)
# -p no:warnings → suppress deprecation warnings from libraries
addopts = -v --tb=short -p no:warnings

# Show extra summary at the end
# f = failed, e = errors, s = skipped, p = passed
log_cli = false

# Custom markers (avoids "unknown mark" warnings)
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: integration tests that require trained model
    quality_gate: CI/CD quality threshold tests
    unit: fast unit tests with no dependencies
